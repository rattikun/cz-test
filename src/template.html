<style>
:root{
  --display:"IBM Plex Sans Thai", "Space Grotesk", system-ui, sans-serif;
  --body:"IBM Plex Sans Thai", "Manrope", system-ui, sans-serif;
  --mono:"JetBrains Mono", ui-monospace, monospace;
  --bg-hue:250;
  --accent:oklch(0.82 0.13 195);
  --accent2:oklch(0.72 0.16 292);
  --pos:oklch(0.80 0.14 158);
  --warn:oklch(0.84 0.14 78);
  --bg:oklch(0.155 0.014 var(--bg-hue));
  --bg2:oklch(0.185 0.016 var(--bg-hue));
  --text:oklch(0.96 0.005 var(--bg-hue));
  --text-dim:oklch(0.74 0.012 var(--bg-hue));
  --text-faint:oklch(0.56 0.012 var(--bg-hue));
  --border:oklch(0.72 0.02 var(--bg-hue) / 0.16);
  --glow:color-mix(in oklch, var(--accent) 50%, transparent);
  --glow-a:0.3;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
#root{height:100%;}
body{
  font-family:var(--body); background:var(--bg); color:var(--text);
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
::selection{background:color-mix(in oklch, var(--accent) 40%, transparent);}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select{font-family:inherit;}
h1,h2,h3{text-wrap:balance;}
.grad-text{background:linear-gradient(92deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;}

/* ---------- glass ---------- */
.glass{
  background:color-mix(in oklch, var(--bg2) 78%, transparent);
  backdrop-filter:blur(20px) saturate(1.2);
  -webkit-backdrop-filter:blur(20px) saturate(1.2);
  border:1px solid var(--border);
}
.ico-tile{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  display:grid;place-items:center;color:var(--accent);
  background:color-mix(in oklch, var(--accent) 12%, transparent);
  border:1px solid color-mix(in oklch, var(--accent) 28%, transparent);
}

/* ---------- app shell ---------- */
.app{position:relative;height:100%;display:flex;flex-direction:column;z-index:1;}
.bg-fx{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:calc(0.18 + var(--glow-a)*0.5);}
.orb-a{width:520px;height:520px;background:var(--accent);top:-160px;right:-80px;}
.orb-b{width:480px;height:480px;background:var(--accent2);bottom:-180px;left:-120px;}
.grid-fade{position:absolute;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:46px 46px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 40%,#000 0%,transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 40%,#000 0%,transparent 75%);
  opacity:0.5;}

/* ---------- topbar ---------- */
.topbar{display:flex;align-items:center;gap:20px;padding:14px 26px;
  border-bottom:1px solid var(--border);
  background:color-mix(in oklch, var(--bg) 70%, transparent);
  backdrop-filter:blur(14px);position:relative;z-index:5;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:11px;}
.brand-mark{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 0 18px -4px var(--glow);}
.brand-name{font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:-0.01em;white-space:nowrap;}
.brand-sub{font-size:11px;color:var(--text-faint);font-family:var(--mono);letter-spacing:.02em;white-space:nowrap;}
.topbar-config{display:flex;gap:6px;margin:0 auto;flex-wrap:wrap;}
.topbar-config span{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);
  font-family:var(--mono);padding:5px 11px;border-radius:999px;border:1px solid var(--border);
  background:color-mix(in oklch, var(--bg2) 60%, transparent);}
.topbar-config span svg{color:var(--accent);}
.topbar-right{margin-left:auto;}

.ghost-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;white-space:nowrap;
  padding:8px 14px;border-radius:10px;border:1px solid var(--border);color:var(--text-dim);
  background:color-mix(in oklch, var(--bg2) 50%, transparent);transition:.18s;}
.ghost-btn svg{flex-shrink:0;}
.ghost-btn:hover{color:var(--text);border-color:color-mix(in oklch, var(--accent) 40%, transparent);}

/* ---------- body / scroll ---------- */
.body{flex:1;overflow-y:auto;position:relative;z-index:1;scroll-behavior:smooth;}
.body::-webkit-scrollbar{width:10px;}
.body::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;border:3px solid transparent;background-clip:padding-box;}

/* ---------- landing ---------- */
.landing-wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:48px 24px 64px;}
.smart-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;}
.smart-input::placeholder{color:var(--text-faint);}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:26px 32px;
  padding-top:22px;border-top:1px solid var(--border);}
.seg{font-size:13px;font-weight:600;padding:8px 14px;border-radius:10px;
  border:1px solid var(--border);color:var(--text-dim);
  background:color-mix(in oklch, var(--bg2) 50%, transparent);transition:.16s;}
.seg:hover{color:var(--text);border-color:color-mix(in oklch, var(--accent) 35%, transparent);}
.seg[data-active="true"]{color:var(--bg);background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-color:transparent;box-shadow:0 0 16px -4px var(--glow);}
.range{-webkit-appearance:none;appearance:none;height:6px;border-radius:99px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));outline:none;}
.range::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:#fff;cursor:pointer;box-shadow:0 0 0 4px color-mix(in oklch, var(--accent) 30%, transparent);}
.range::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:none;cursor:pointer;}
.stepper{display:flex;align-items:center;gap:4px;border:1px solid var(--border);border-radius:10px;padding:3px;
  background:color-mix(in oklch, var(--bg2) 50%, transparent);}
.stepper button{width:26px;height:26px;border-radius:7px;font-size:16px;color:var(--text-dim);}
.stepper button:hover{background:color-mix(in oklch, var(--accent) 16%, transparent);color:var(--text);}
.cta{display:inline-flex;align-items:center;gap:10px;font-family:var(--display);font-size:16px;font-weight:600;
  color:var(--bg);padding:14px 24px;border-radius:13px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 10px 34px -10px var(--glow),inset 0 1px 0 rgba(255,255,255,.3);transition:.2s;}
.cta:hover{transform:translateY(-2px);box-shadow:0 16px 44px -10px var(--glow);}
.cta svg{transition:.2s;}
.cta:hover svg:last-child{transform:translateX(3px);}

/* ---------- processing overlay ---------- */
.proc-overlay{position:fixed;inset:0;z-index:40;display:grid;place-items:center;padding:24px;
  background:color-mix(in oklch, var(--bg) 86%, transparent);backdrop-filter:blur(10px);
  animation:fade .35s ease;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.proc-core{display:flex;flex-direction:column;align-items:center;width:min(620px,100%);}
.proc-orb{position:relative;width:220px;height:220px;display:grid;place-items:center;}
.proc-icon{position:absolute;color:var(--accent);filter:drop-shadow(0 0 12px var(--glow));}
.orb-spin{animation:spin 3.5s linear infinite;}
.orb-spin-slow{animation:spin 18s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
.proc-strip{display:flex;align-items:center;margin-top:34px;width:100%;justify-content:center;}
.strip-node{display:flex;align-items:center;}
.strip-dot{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
  border:1px solid var(--border);color:var(--text-faint);
  background:color-mix(in oklch, var(--bg2) 60%, transparent);transition:.3s;}
.strip-node[data-state="active"] .strip-dot{color:var(--bg);background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-color:transparent;box-shadow:0 0 18px -2px var(--glow);transform:scale(1.12);}
.strip-node[data-state="done"] .strip-dot{color:var(--pos);border-color:color-mix(in oklch,var(--pos) 40%,transparent);
  background:color-mix(in oklch,var(--pos) 14%,transparent);}
.strip-line{width:22px;height:2px;background:var(--border);transition:.3s;}
.strip-line[data-on="true"]{background:var(--accent);box-shadow:0 0 8px var(--glow);}
.proc-log{margin-top:30px;width:100%;height:118px;overflow:hidden;border-radius:12px;
  border:1px solid var(--border);background:color-mix(in oklch, #000 30%, var(--bg2));
  padding:14px 16px;font-family:var(--mono);font-size:12px;color:var(--text-dim);}
.log-line{padding:2px 0;animation:slidein .3s ease;}
@keyframes slidein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.log-cursor{display:inline-block;color:var(--accent);animation:blink 1s steps(1) infinite;}
@keyframes blink{50%{opacity:0;}}

/* ---------- results layout ---------- */
.results-layout{display:grid;grid-template-columns:212px 1fr;max-width:1280px;margin:0 auto;
  padding:26px 26px 0;gap:30px;}
.sidebar{position:sticky;top:0;align-self:start;display:flex;flex-direction:column;gap:4px;padding-top:6px;}
.side-kicker{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;color:var(--text-faint);
  text-transform:uppercase;padding:0 12px 10px;}
.side-link{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;
  font-size:13.5px;font-weight:600;color:var(--text-dim);text-align:left;transition:.16s;border:1px solid transparent;white-space:nowrap;}
.side-link svg{flex-shrink:0;}
.side-link:hover{color:var(--text);background:color-mix(in oklch, var(--bg2) 60%, transparent);}
.side-link[data-active="true"]{color:var(--text);background:color-mix(in oklch, var(--accent) 12%, transparent);
  border-color:color-mix(in oklch, var(--accent) 26%, transparent);}
.side-link[data-active="true"] svg{color:var(--accent);}
.side-card{margin-top:18px;padding:15px;border-radius:13px;border:1px solid var(--border);
  background:color-mix(in oklch, var(--accent) 7%, transparent);}
.results-main{min-width:0;padding-bottom:60px;}
.results-main section{padding:34px 0;border-top:1px solid var(--border);}
.results-main section:first-child{border-top:none;padding-top:8px;}

/* ---------- workflow diagram ---------- */
.wf-rows{display:flex;flex-direction:column;}
.wf-row{display:grid;grid-template-columns:1fr 30px 1fr 30px 1fr;align-items:stretch;}
.wf-node{padding:16px;border-radius:14px;border:1px solid var(--border);
  background:color-mix(in oklch, var(--bg2) 70%, transparent);transition:.2s;min-width:0;}
.wf-node[data-active="true"]{border-color:color-mix(in oklch, var(--accent) 45%, transparent);
  background:color-mix(in oklch, var(--accent) 9%, transparent);box-shadow:0 0 22px -8px var(--glow);transform:translateY(-2px);}
.wf-node-top{display:flex;align-items:center;justify-content:space-between;}
.wf-ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--accent);
  background:color-mix(in oklch, var(--accent) 13%, transparent);border:1px solid color-mix(in oklch, var(--accent) 26%, transparent);}
.wf-num{font-family:var(--mono);font-size:13px;color:var(--text-faint);font-weight:600;}
.wf-title{font-family:var(--display);font-weight:600;font-size:14.5px;margin-top:12px;}
.wf-desc{font-size:12px;color:var(--text-dim);margin-top:4px;line-height:1.4;min-height:48px;}
.wf-metric{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-family:var(--mono);
  font-size:11px;color:var(--pos);}
.wf-conn{display:grid;place-items:center;}
.wf-flow{width:100%;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));position:relative;overflow:hidden;border-radius:9px;opacity:.6;}
.wf-flow::after{content:"";position:absolute;top:0;left:-40%;width:40%;height:100%;background:#fff;
  filter:blur(2px);animation:flow 2.2s linear infinite;}
@keyframes flow{to{left:120%;}}
.wf-vconn{display:flex;flex-direction:column;align-items:center;height:26px;color:var(--accent);}
.wf-vflow{width:2px;flex:1;background:linear-gradient(180deg,var(--accent2),var(--accent));opacity:.5;border-radius:9px;}
.wf-vconn svg{margin-top:-3px;}

/* ---------- recommendations ---------- */
.rec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.rec-card{padding:16px;border-radius:18px;border:1px solid var(--border);
  background:color-mix(in oklch, var(--bg2) 72%, transparent);backdrop-filter:blur(16px);transition:.2s;}
.rec-card:hover{transform:translateY(-3px);border-color:color-mix(in oklch, var(--accent) 38%, transparent);
  box-shadow:0 24px 50px -24px var(--glow);}
.rec-card[data-rank="0"]{border-color:color-mix(in oklch, var(--pos) 40%, transparent);
  box-shadow:0 0 0 1px color-mix(in oklch,var(--pos) 28%,transparent),0 20px 50px -26px color-mix(in oklch,var(--pos) 60%,transparent);}
.rec-rankbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.rec-medal{font-family:var(--display);font-weight:700;font-size:18px;width:38px;height:38px;border-radius:10px;
  display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);}
.rec-card[data-rank="0"] .rec-medal{background:linear-gradient(135deg,var(--pos),var(--accent));}
.rec-place{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--text-dim);text-transform:uppercase;margin-right:auto;}
.rec-reasons{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
.rec-reasons-head{display:flex;align-items:center;gap:6px;font-size:11.5px;font-family:var(--mono);
  letter-spacing:.04em;color:var(--accent);text-transform:uppercase;margin-bottom:11px;}
.rec-reason{display:flex;gap:9px;font-size:13px;color:var(--text-dim);line-height:1.45;margin-bottom:9px;}
.rc-check{flex-shrink:0;width:18px;height:18px;border-radius:6px;display:grid;place-items:center;margin-top:1px;
  color:var(--pos);background:color-mix(in oklch, var(--pos) 14%, transparent);}

/* ---------- sources ---------- */
.src-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.src-card{transition:.2s;}
.src-card:hover{transform:translateY(-3px);border-color:color-mix(in oklch, var(--accent) 38%, transparent);}
.src-ico{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:var(--accent);
  background:color-mix(in oklch, var(--accent) 12%, transparent);border:1px solid color-mix(in oklch, var(--accent) 26%, transparent);}
.src-verified{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10.5px;color:var(--pos);}
.src-trust{display:flex;align-items:center;gap:11px;margin-top:18px;padding:14px 18px;border-radius:13px;
  border:1px dashed var(--border);color:var(--text-dim);font-size:12.5px;}
.src-trust svg{color:var(--pos);flex-shrink:0;}

/* ---------- ranking ---------- */
.rank-controls{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
.rank-search{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:11px;border:1px solid var(--border);
  background:color-mix(in oklch, var(--bg2) 60%, transparent);color:var(--text-faint);flex:1;min-width:220px;}
.rank-search input{background:transparent;border:none;outline:none;color:var(--text);font-size:13.5px;flex:1;}
.rank-search input::placeholder{color:var(--text-faint);}
.rcf-label{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--text-faint);text-transform:uppercase;}
.rank-filter{display:flex;align-items:center;gap:10px;}
.chip{font-size:12px;font-weight:600;padding:6px 11px;border-radius:8px;border:1px solid var(--border);
  color:var(--text-dim);background:color-mix(in oklch, var(--bg2) 50%, transparent);transition:.15s;}
.chip:hover{color:var(--text);}
.chip[data-active="true"]{color:var(--accent);border-color:color-mix(in oklch, var(--accent) 40%, transparent);
  background:color-mix(in oklch, var(--accent) 12%, transparent);}
.rank-sort{display:flex;align-items:center;gap:10px;}
.rank-sort select{padding:8px 12px;border-radius:9px;border:1px solid var(--border);
  background:color-mix(in oklch, var(--bg2) 60%, transparent);color:var(--text);font-size:13px;font-weight:600;outline:none;}
.rank-list{display:flex;flex-direction:column;gap:10px;}
.rank-row{position:relative;border-radius:14px;border:1px solid var(--border);overflow:hidden;
  background:color-mix(in oklch, var(--bg2) 65%, transparent);transition:.18s;z-index:1;}
.rank-row:hover{border-color:color-mix(in oklch, var(--accent) 32%, transparent);z-index:10;overflow:visible;}
.rank-row[data-expanded="true"]{border-color:color-mix(in oklch, var(--accent) 42%, transparent);
  box-shadow:0 18px 44px -26px var(--glow);}
.rank-main{display:grid;grid-template-columns:42px 64px 1fr auto 56px 34px;align-items:center;gap:16px;padding:12px 16px;cursor:pointer;}
.rank-badge{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-family:var(--display);
  font-weight:700;font-size:15px;color:var(--text-dim);border:1px solid var(--border);
  background:color-mix(in oklch, var(--bg2) 50%, transparent);}
.rank-badge[data-top="true"]{color:var(--bg);background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;}
.rank-thumb{width:64px;border-radius:10px;overflow:hidden;}
.rank-stats{display:flex;gap:22px;}
.rstat{display:flex;flex-direction:column;gap:3px;}
.rstat-l{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--text-faint);font-family:var(--mono);text-transform:uppercase;}
.rstat-l svg{color:var(--accent);}
.rstat-v{font-family:var(--mono);font-size:14px;font-weight:600;}
.rank-expand{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--text-faint);transition:.2s;}
.rank-expand[data-on="true"]{transform:rotate(180deg);color:var(--accent);}
.rank-detail{display:grid;grid-template-columns:1fr 1.2fr;gap:28px;padding:8px 22px 22px 22px;
  border-top:1px solid var(--border);animation:slidein .3s ease;}
.rd-col{display:flex;flex-direction:column;align-items:center;}
.rd-col:last-child{align-items:stretch;}
.rd-head{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11.5px;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px;align-self:flex-start;}
.rd-head svg{color:var(--accent);}
.rd-sources{display:flex;align-items:center;gap:7px;margin-top:16px;flex-wrap:wrap;}
.rank-empty{padding:40px;text-align:center;color:var(--text-faint);font-family:var(--mono);font-size:13px;}

/* ---------- viz ---------- */
.viz-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;}
.viz-wide,.viz-radar{grid-column:1 / -1;}
.viz-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.viz-head>span:first-child{display:flex;align-items:center;gap:8px;font-family:var(--display);font-weight:600;font-size:15px;}
.viz-head svg{color:var(--accent);}
.viz-sub{font-family:var(--mono);font-size:11px;color:var(--text-faint);}

/* ---------- footer ---------- */
.foot{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:30px;padding-top:22px;
  border-top:1px solid var(--border);color:var(--text-faint);font-size:12px;font-family:var(--mono);}

[data-motion="reduce"] *{animation-duration:0s !important;transition-duration:0s !important;}

/* ---------- responsive ---------- */
@media (max-width:1000px){
  .results-layout{grid-template-columns:1fr;}
  .sidebar{position:static;flex-direction:row;flex-wrap:wrap;gap:6px;}
  .side-kicker,.side-card{display:none;}
  .wf-row{grid-template-columns:1fr;}
  .wf-conn{display:none;}
  .rec-grid,.src-grid{grid-template-columns:1fr 1fr;}
  .viz-grid{grid-template-columns:1fr;}
}
@media (max-width:760px){
  .setup-grid{grid-template-columns:1fr;}
  .rec-grid,.src-grid{grid-template-columns:1fr;}
  .rank-stats{display:none;}
  .rank-main{grid-template-columns:34px 52px 1fr 50px 30px;}
  .rank-detail{grid-template-columns:1fr;}
  .topbar-config{display:none;}
}
</style>
</head>
